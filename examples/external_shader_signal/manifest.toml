manifest_version = 1

# ---- identity ----
id          = "external-shader-signal"
name        = "Signal Wave (example)"
version     = "1.0.0"
author      = "Static examples"
description = "External shader that warps the image with a signal-driven wave; multiple params + a consumed signal."
license     = "MIT"
tags        = ["filter", "example", "signal", "external", "shader"]

# ---- engine compatibility ----
api_min = 1
api_max = 1

# ---- kind ----
kind = "pipeline"

[[shaders]]
id    = "main"
path  = "shaders/wave.wgsl"
stage = "fragment"
entry = "fs_main"

# ---- parameters ----
# Two params → packed in sorted-key order: [amount, softness]. The shader struct
# lists them in that exact order, padded to 16 bytes (2 reals + 2 pad floats).
[params.amount]
type    = "f32"
default = 0.6
min     = 0.0
max     = 1.0
label   = "Amount"
group   = "Wave"
help    = "Horizontal displacement strength."

[params.softness]
type    = "f32"
default = 0.3
min     = 0.0
max     = 1.0
label   = "Softness"
group   = "Wave"
help    = "Edge softening of the thresholded output."

# ---- signals consumed ----
[[consume]]
name     = "signal.time"
kind     = "f32"
optional = true
